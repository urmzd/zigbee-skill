name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: urmzd/semantic-release@v1
        id: sr
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build-command: |
            mkdir -p bin
            for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
              GOOS=${target%/*}
              GOARCH=${target#*/}
              for dir in cmd/*/; do
                name=$(basename "$dir")
                output="bin/zigbee-rest-${name}-${GOOS}-${GOARCH}"
                GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 go build -o "$output" "./$dir"
              done
            done
          artifacts: "bin/*"

    outputs:
      released: ${{ steps.sr.outputs.released }}
      tag: ${{ steps.sr.outputs.tag }}

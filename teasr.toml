[output]
dir = "./showcase"

[[output.formats]]
output_type = "png"

[font]
family = "MonaspiceNe Nerd Font"

[[scenes]]
type = "terminal"
name = "cli-help"
theme = "dracula"
cwd = "."
cols = 100

[[scenes.interactions]]
type = "type"
text = "go run ./cmd/cli/main.go --help"
speed = 50
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 15000

[[scenes]]
type = "terminal"
name = "cli-json-output"
theme = "dracula"
cwd = "."
cols = 100
rows = 30

[[scenes.interactions]]
type = "type"
text = "go run ./cmd/cli/main.go health 2>&1"
speed = 50
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 15000
